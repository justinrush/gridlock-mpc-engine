on: [pull_request]

name: Continuous Integration Validate Docker Files

jobs:
  check:
    name: Validate docker-compose files
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Validate development config
        run: |
          docker-compose --env-file .env.tmpl -f docker-compose.yml -f docker-compose.override.yml config --quiet
      - name: Validate production config
        run: |
          docker-compose --env-file .env.tmpl -f docker-compose.yml -f docker-compose.prod.yml config --quiet
      - name: Validate webhook config
        run: |
          docker-compose --env-file .env.tmpl -f docker-compose.webhook.yml config --quiet
